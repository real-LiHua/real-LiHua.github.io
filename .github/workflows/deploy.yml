name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  pages: write

jobs:
  cloudflare:
    name: cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true

      - name: Build
        env:
          SITE_URL: ${{ vars.CF_PAGES_URL || 'https://lihua.codeberg.page' }}
        run: pnpm build

      - uses: cloudflare/wrangler-action@v4
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  codeberg:
    name: codeberg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true

      - name: Build
        env:
          SITE_URL: https://lihua.codeberg.page
        run: |
          pnpm build
          rm -vr "./dist/server"

      - name: Create SSH directory
        run: mkdir ~/.ssh

      - name: Add Codeberg to known_hosts
        run: echo "codeberg.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIVIC02vnjFyL+I4RHfvIGNtOgJMe769VTF1VR4EB3ZB" >> ~/.ssh/known_hosts

      - name: Write SSH key
        run: echo "${{ secrets.CODEBERG_PAGES }}" > ~/.ssh/id_ed25519

      - name: Set SSH key permissions
        run: chmod 400 ~/.ssh/id_ed25519

      - name: Push to Codeberg
        working-directory: ./dist/client
        run: |
          git clone --bare ssh://git@codeberg.org/lihua/pages .git
          git config unset core.bare
          git config set user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config set user.name "github-actions[bot]"
          git add .
          git commit -m "Update" || true
          git push -f origin main

  github:
    name: github
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: withastro/action@v6
        env:
          SITE_URL: https://real-LiHua.github.io
        with:
          out-dir: dist/client

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  ipfs:
    name: ipfs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/setup@v1
        with:
          runtime: node@24
          cache: true

      - name: Build
        run: |
          pnpm build
          rm -vr "./dist/server"

      - name: Setup Kubo CLI
        uses: ipfs/download-ipfs-distribution-action@v1

      - name: ipfs init
        run: ipfs init

      - name: Set pin name
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '/' '-')
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHA_SHORT="${COMMIT_SHA:0:7}"
          PIN_NAME="${REPO_NAME}-${COMMIT_SHA_SHORT}"
          echo "pin_name=${PIN_NAME}" >> "$GITHUB_ENV"
          echo "Using pin name: ${PIN_NAME}"

      - name: Pin CID to Pinata
        run: |
          CID=$(ipfs add --cid-version 1 --chunker size-1048576 -Q -r .)
          ipfs pin remote service add pinata "https://api.pinata.cloud/psa" ${{ secrets.PINATA_JWT_TOKEN }}
          ipfs pin remote add --service=pinata --background --name="${pin_name}" $CID
          echo "Pinned CID ${CID} to Pinata" >> $GITHUB_STEP_SUMMARY
